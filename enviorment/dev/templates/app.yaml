apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-argo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Virgin28/realchart'  # Replace with your repository URL
    targetRevision: main
    path: realchart
    helm:
      valueFiles:
        - values.yaml  # Specify the values.yaml to override defaults
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd  #
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
